<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Módulo — Concejo Study</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    :root{--gold:#C9A84C;--gold-light:#E8CC7A;--dark:#0A0E1A;--dark2:#111827;--surface:#1E2740;--surface2:#243050;--text:#E8EAF0;--text2:#9AA3B8;--green:#34D399;--red:#F87171;}
    body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
    nav{background:var(--dark2);border-bottom:1px solid rgba(255,255,255,0.06);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
    .nav-back{color:var(--text2);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px;transition:color 0.2s;}
    .nav-back:hover{color:var(--gold);}
    .nav-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#fff;margin-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
    .nav-progress{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2);flex-shrink:0;}
    .nav-prog-bar{width:80px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
    .nav-prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.3s;}
    .cap-header{background:linear-gradient(135deg,#0D1529 0%,#111827 100%);padding:36px 24px 30px;border-bottom:1px solid rgba(255,255,255,0.06);position:relative;overflow:hidden;}
    .cap-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(201,168,76,0.08) 0%,transparent 60%);}
    .cap-header-inner{max-width:760px;margin:0 auto;position:relative;}
    .cap-titulo-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:10px;}
    .cap-icon-big{font-size:40px;margin-bottom:12px;display:block;}
    .cap-nombre{font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,34px);font-weight:900;color:#fff;margin-bottom:8px;line-height:1.2;}
    .cap-sub{font-size:14px;color:var(--text2);line-height:1.5;}
    main{max-width:760px;margin:0 auto;padding:32px 20px 80px;}
    .art-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
    .art-counter{font-size:13px;color:var(--text2);}
    .art-num-real{color:var(--gold);font-weight:700;font-size:16px;}
    .art-dots{display:flex;gap:4px;flex-wrap:wrap;max-width:320px;}
    .art-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.12);cursor:pointer;transition:all 0.2s;}
    .art-dot.active{background:var(--gold);transform:scale(1.3);}
    .art-dot.leido{background:rgba(201,168,76,0.4);}
    .art-card{background:var(--surface);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:28px;margin-bottom:20px;animation:fadeSlide 0.3s ease;}
    .art-num-badge{display:inline-flex;align-items:center;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.25);color:var(--gold);font-size:11px;font-weight:600;letter-spacing:1px;padding:4px 12px;border-radius:100px;margin-bottom:14px;}
    .art-titulo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:18px;line-height:1.3;}
    .art-body{font-size:14px;line-height:1.85;color:var(--text2);}
    .art-body .bloque-p{margin-bottom:12px;}
    .art-body .numeral{display:flex;gap:12px;margin-bottom:10px;}
    .art-body .numeral-num{min-width:30px;color:var(--gold);font-weight:700;font-size:13px;padding-top:1px;flex-shrink:0;}
    .art-body .numeral-text{flex:1;}
    .art-body .paragrafo-box{background:rgba(201,168,76,0.07);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:12px 16px;margin:16px 0;}
    .art-body .paragrafo-label{color:var(--gold);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
    .art-body .paragrafo-texto{color:var(--text2);font-size:14px;line-height:1.7;}
    .art-body .subtitulo-line{color:var(--text);font-weight:600;font-size:13px;margin:16px 0 10px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.06);}
    /* Índice / Tabla de contenido */
    .art-body .indice-item{display:flex;align-items:baseline;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
    .art-body .indice-titulo{color:var(--text);font-weight:500;font-size:13px;flex:1;}
    .art-body .indice-pagina{color:var(--gold);font-size:12px;font-weight:600;white-space:nowrap;}
    .art-btns{display:flex;gap:12px;margin-bottom:32px;}
    .btn{flex:1;padding:12px 20px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);}
    .btn-secondary:hover{background:var(--surface);}
    .btn-primary{background:var(--gold);color:#000;font-weight:600;}
    .btn-primary:hover{background:var(--gold-light);}
    .btn:disabled{opacity:0.35;cursor:not-allowed;}
    .exam-section{background:var(--surface);border:1px solid rgba(201,168,76,0.2);border-radius:16px;padding:28px;display:none;}
    .exam-section.visible{display:block;animation:fadeSlide 0.3s ease;}
    .exam-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
    .exam-icon{width:44px;height:44px;background:rgba(201,168,76,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .exam-header-text h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;}
    .exam-header-text p{font-size:12px;color:var(--text2);margin-top:3px;}
    .exam-progress-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;margin:16px 0 24px;overflow:hidden;}
    .exam-progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.4s;}
    .question-block{margin-bottom:28px;display:none;}
    .question-block.active{display:block;animation:fadeSlide 0.3s ease;}
    .question-text{font-size:15px;font-weight:500;color:var(--text);margin-bottom:14px;line-height:1.5;}
    .q-num{display:inline-block;background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;margin-right:8px;}
    .options{display:flex;flex-direction:column;gap:8px;}
    .opt-btn{background:var(--surface2);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;text-align:left;transition:all 0.2s;display:flex;align-items:center;gap:12px;}
    .opt-btn:hover:not(:disabled){border-color:var(--gold);background:rgba(201,168,76,0.07);}
    .opt-btn.correct{background:rgba(52,211,153,0.15);border-color:var(--green);color:var(--green);}
    .opt-btn.wrong{background:rgba(248,113,113,0.15);border-color:var(--red);color:var(--red);}
    .opt-letter{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
    .opt-btn.correct .opt-letter{background:var(--green);color:#000;}
    .opt-btn.wrong .opt-letter{background:var(--red);color:#000;}
    .btn-next-q{width:100%;margin-top:16px;padding:13px;background:var(--gold);color:#000;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;display:none;}
    .btn-next-q:hover{background:var(--gold-light);}
    .exam-result{text-align:center;padding:28px 20px;border-radius:12px;margin-top:8px;display:none;}
    .exam-result.visible{display:block;animation:fadeSlide 0.3s ease;}
    .exam-result.pass{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);}
    .exam-result.fail{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);}
    .exam-result-score{font-size:48px;font-family:'Playfair Display',serif;font-weight:900;line-height:1;}
    .exam-result.pass .exam-result-score{color:var(--green);}
    .exam-result.fail .exam-result-score{color:var(--red);}
    .exam-result-label{font-size:14px;color:var(--text2);margin-top:8px;}
    .btn-complete{width:100%;margin-top:16px;padding:14px;background:var(--green);color:#000;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .btn-complete:hover{filter:brightness(1.1);}
    .btn-retry{width:100%;margin-top:10px;padding:13px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
    .btn-retry:hover{background:var(--surface);}
  </style>
</head>
<body>
<nav>
  <a class="nav-back" href="index.html">← Módulos</a>
  <span style="color:rgba(255,255,255,0.15)">|</span>
  <span class="nav-title" id="nav-cap-nombre">Cargando...</span>
  <div class="nav-progress">
    <div class="nav-prog-bar"><div class="nav-prog-fill" id="nav-prog-fill" style="width:0%"></div></div>
    <span id="nav-prog-label">0%</span>
  </div>
</nav>
<div class="cap-header">
  <div class="cap-header-inner">
    <div class="cap-titulo-label" id="cap-titulo-label"></div>
    <span class="cap-icon-big" id="cap-icon"></span>
    <div class="cap-nombre" id="cap-nombre"></div>
    <div class="cap-sub" id="cap-sub"></div>
  </div>
</div>
<main>
  <div class="art-nav">
    <div class="art-counter">
      Artículo <span class="art-num-real" id="art-num-real">—</span>
      &nbsp;<span id="art-pos-label" style="font-size:11px;color:var(--text2);"></span>
    </div>
    <div class="art-dots" id="art-dots"></div>
  </div>
  <div class="art-card" id="art-card">
    <div class="art-num-badge" id="art-badge"></div>
    <div class="art-titulo" id="art-titulo"></div>
    <div class="art-body" id="art-body"></div>
  </div>
  <div class="art-btns">
    <button class="btn btn-secondary" id="btn-prev" onclick="prevArt()">← Anterior</button>
    <button class="btn btn-primary" id="btn-next" onclick="nextArt()">Siguiente →</button>
  </div>
  <div class="exam-section" id="exam-section">
    <div class="exam-header">
      <div class="exam-icon">📝</div>
      <div class="exam-header-text">
        <h3>Examen del Módulo</h3>
        <p id="exam-subtitle">Responde una pregunta a la vez</p>
      </div>
    </div>
    <div class="exam-progress-bar"><div class="exam-progress-fill" id="exam-prog-fill" style="width:0%"></div></div>
    <div id="questions-container"></div>
    <button class="btn-next-q" id="btn-next-q" onclick="nextQuestion()">Siguiente pregunta →</button>
    <div class="exam-result" id="exam-result">
      <div class="exam-result-score" id="result-score"></div>
      <div class="exam-result-label" id="result-msg"></div>
      <button class="btn-complete" id="btn-complete" onclick="completeModule()" style="display:none;">✓ Módulo completado — Volver al inicio</button>
      <button class="btn-retry" onclick="retryExam()">Intentar de nuevo</button>
    </div>
  </div>
</main>

<script src="js/contenido.js"></script>
<script src="js/app.js"></script>
<script src="js/examenes.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const capId = parseInt(params.get('id')) || 1;
  const cap = CAPITULOS.find(c => c.id === capId);
  if(!cap) location.href = 'index.html';

  const artNums = cap.articulos.filter(n => ARTICULOS[String(n)]);
  let currentIdx = 0;
  let leidos = new Set();
  let examQuestions = [];
  let currentQ = 0;
  let answers = {};

  document.getElementById('nav-cap-nombre').textContent = cap.nombre;
  document.getElementById('cap-titulo-label').textContent = cap.titulo;
  document.getElementById('cap-icon').textContent = cap.icono;
  document.getElementById('cap-nombre').textContent = cap.nombre;
  document.getElementById('cap-sub').textContent = cap.subtitulo;
  document.title = cap.nombre + ' — Concejo Study';

  // ── FORMATEO ESPECIAL PARA EL PREÁMBULO (artículo 0) ──
  function formatPreambulo(raw) {
    const lines = raw.split('\n');
    let html = '<div style="margin-bottom:16px;padding:12px 16px;background:rgba(201,168,76,0.08);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;"><div style="color:var(--gold);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;">Tabla de Contenido</div>';
    
    // Extract table of contents lines (those with dots and numbers)
    const tocLines = [];
    const textLines = [];
    let inTOC = true;
    
    for(const line of lines) {
      const trimmed = line.trim();
      if(!trimmed) continue;
      // TOC lines have dots (....) followed by numbers
      if(inTOC && /\.{3,}/.test(trimmed)) {
        // Parse: "TÍTULO ........ 5"
        const parts = trimmed.split(/\.{3,}/);
        if(parts.length >= 2) {
          const titulo = parts[0].trim();
          const pagina = parts[parts.length-1].trim();
          tocLines.push({titulo, pagina});
        }
      } else {
        inTOC = false;
        textLines.push(trimmed);
      }
    }

    if(tocLines.length > 0) {
      html += tocLines.map(t => 
        `<div class="indice-item"><span class="indice-titulo">${t.titulo}</span><span class="indice-pagina">Pág. ${t.pagina}</span></div>`
      ).join('');
      html += '</div>';
      // Now render the CONSIDERANDOS text
      if(textLines.length > 0) {
        html += '<div style="margin-top:20px;padding:12px 16px;background:rgba(79,126,255,0.08);border-left:3px solid #4F7EFF;border-radius:0 8px 8px 0;margin-bottom:16px;"><div style="color:#4F7EFF;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;">Considerandos y Fundamentos Legales</div></div>';
        // Split considerandos by letters a), b), c)...
        const fullText = textLines.join(' ');
        const considerandos = fullText.split(/(?=\b[a-p]\)\s)/);
        considerandos.forEach(c => {
          const t = c.trim();
          if(!t) return;
          if(/^[a-p]\)\s/.test(t)) {
            const letra = t.match(/^([a-p]\))/)[1];
            const contenido = t.slice(letra.length).trim();
            html += `<div style="display:flex;gap:10px;margin-bottom:10px;"><span style="color:var(--gold);font-weight:700;font-size:13px;min-width:24px;flex-shrink:0;">${letra}</span><span style="color:var(--text2);font-size:14px;line-height:1.7;">${contenido}</span></div>`;
          } else {
            html += `<div class="bloque-p">${t}</div>`;
          }
        });
      }
    } else {
      html = `<div class="bloque-p">${raw}</div>`;
    }
    return html;
  }

  // ── FORMATEO GENERAL DE ARTÍCULOS ──
  function formatTexto(raw) {
    const lines = raw.split('\n');
    let html = '';
    let i = 0;
    while(i < lines.length) {
      const line = lines[i].trim();
      if(!line){i++;continue;}
      if(/^Parágrafo\s+\d/i.test(line)){
        const label = line.match(/^(Parágrafo\s+\d+[°º]?\.?)/i)?.[1] || 'Parágrafo';
        let body = line.slice(label.length).trim();
        while(i+1<lines.length){
          const next=lines[i+1].trim();
          if(!next||/^Parágrafo\s+\d/i.test(next)||/^\d{1,2}\.\s/.test(next))break;
          body+=' '+next;i++;
        }
        html+=`<div class="paragrafo-box"><div class="paragrafo-label">${label}</div><div class="paragrafo-texto">${body}</div></div>`;
      } else if(/^\d{1,2}\.\s/.test(line)){
        const m=line.match(/^(\d{1,2}\.)\s(.*)/);
        let body=m[2];
        while(i+1<lines.length){
          const next=lines[i+1].trim();
          if(!next||/^\d{1,2}\.\s/.test(next)||/^Parágrafo\s+\d/i.test(next))break;
          body+=' '+next;i++;
        }
        html+=`<div class="numeral"><span class="numeral-num">${m[1]}</span><span class="numeral-text">${body}</span></div>`;
      } else if(/^(Según el |De conformidad |Conforme al )/.test(line)){
        html+=`<div class="subtitulo-line">${line}</div>`;
      } else {
        html+=`<div class="bloque-p">${line}</div>`;
      }
      i++;
    }
    return html;
  }

  function getTitle(art) {
    const first = art.texto.split('\n')[0].trim();
    const dot = first.indexOf('.');
    if(dot>0 && dot<100) return first.substring(0,dot+1);
    return first.substring(0,80)+(first.length>80?'...':'');
  }

  function renderDots(){
    document.getElementById('art-dots').innerHTML = artNums.map((n,i)=>
      `<div class="art-dot ${i===currentIdx?'active':''} ${leidos.has(i)?'leido':''}" onclick="goTo(${i})" title="Art. ${n===0?'Preámbulo':n}"></div>`
    ).join('');
  }

  function updateProgress(){
    const pct=Math.round((leidos.size/artNums.length)*100);
    document.getElementById('nav-prog-fill').style.width=pct+'%';
    document.getElementById('nav-prog-label').textContent=pct+'%';
  }

  function showArticle(idx){
    currentIdx=idx;
    leidos.add(idx);
    const artNum=artNums[idx];
    const art=ARTICULOS[String(artNum)];
    const esPreambulo = artNum===0;

    document.getElementById('art-num-real').textContent = esPreambulo?'Preámbulo':artNum;
    document.getElementById('art-pos-label').textContent=`(${idx+1} de ${artNums.length} en este módulo)`;
    document.getElementById('art-badge').textContent = esPreambulo?'Preámbulo y Considerandos':'Artículo '+artNum;
    document.getElementById('art-titulo').textContent = esPreambulo ? 'Índice y Considerandos del Acuerdo 024 de 2025' : getTitle(art);
    document.getElementById('art-body').innerHTML = esPreambulo ? formatPreambulo(art.texto) : formatTexto(art.texto);

    document.getElementById('btn-prev').disabled=idx===0;
    const isLast=idx===artNums.length-1;
    const btnNext=document.getElementById('btn-next');
    if(isLast){btnNext.textContent='Ir al Examen ✏️';btnNext.onclick=showExam;}
    else{btnNext.textContent='Siguiente →';btnNext.onclick=nextArt;}

    // Ocultar examen al navegar
    document.getElementById('exam-section').classList.remove('visible');
    renderDots();
    updateProgress();
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function goTo(idx){showArticle(idx);}
  function prevArt(){if(currentIdx>0)showArticle(currentIdx-1);}
  function nextArt(){if(currentIdx<artNums.length-1)showArticle(currentIdx+1);}

  function showExam(){
    const allQ=EXAMENES[capId]||[];
    const shuffled=[...allQ].sort(()=>Math.random()-0.5);
    examQuestions=shuffled.slice(0,Math.min(20,shuffled.length));
    currentQ=0; answers={};
    document.getElementById('exam-result').style.display='none';
    document.getElementById('exam-result').className='exam-result';
    document.getElementById('exam-section').classList.add('visible');
    document.getElementById('exam-subtitle').textContent=`${examQuestions.length} preguntas — una a la vez`;
    renderAllQuestions();
    showQuestion(0);
    document.getElementById('exam-section').scrollIntoView({behavior:'smooth',block:'start'});
  }

  function renderAllQuestions(){
    const letters=['A','B','C','D'];
    document.getElementById('questions-container').innerHTML=examQuestions.map((q,qi)=>`
      <div class="question-block" id="qblock-${qi}">
        <div class="question-text"><span class="q-num">${qi+1} de ${examQuestions.length}</span>${q.p}</div>
        <div class="options">${q.ops.map((op,oi)=>`
          <button class="opt-btn" id="opt-${qi}-${oi}" onclick="selectOpt(${qi},${oi})">
            <span class="opt-letter">${letters[oi]}</span>${op}
          </button>`).join('')}</div>
      </div>`).join('');
  }

  function showQuestion(qi){
    document.querySelectorAll('.question-block').forEach(b=>b.classList.remove('active'));
    const block=document.getElementById(`qblock-${qi}`);
    if(block)block.classList.add('active');
    const pct=Math.round((qi/examQuestions.length)*100);
    document.getElementById('exam-prog-fill').style.width=pct+'%';
    document.getElementById('btn-next-q').style.display='none';
  }

  function selectOpt(qi,oi){
    if(answers[qi]!==undefined)return;
    answers[qi]=oi;
    const q=examQuestions[qi];
    const letters=['A','B','C','D'];
    q.ops.forEach((_,i)=>{
      const btn=document.getElementById(`opt-${qi}-${i}`);
      btn.disabled=true;
      if(i===q.r)btn.classList.add('correct');
      else if(i===oi)btn.classList.add('wrong');
      btn.querySelector('.opt-letter').textContent=letters[i];
    });
    if(qi<examQuestions.length-1){
      document.getElementById('btn-next-q').style.display='block';
    }else{
      finishExam();
    }
  }

  function nextQuestion(){currentQ++;showQuestion(currentQ);}

  function finishExam(){
    const correct=examQuestions.filter((q,i)=>answers[i]===q.r).length;
    const score=Math.round((correct/examQuestions.length)*100);
    const res=document.getElementById('exam-result');
    res.style.display='block';
    res.className='exam-result '+(score>=67?'pass':'fail');
    document.getElementById('result-score').textContent=score+'%';
    document.getElementById('result-msg').textContent=score>=67
      ?`¡Excelente! ${correct} de ${examQuestions.length} respuestas correctas.`
      :`${correct} de ${examQuestions.length} correctas. Repasa el módulo e intenta de nuevo.`;
    document.getElementById('exam-prog-fill').style.width='100%';
    document.getElementById('btn-next-q').style.display='none';
    if(score>=67)document.getElementById('btn-complete').style.display='block';
    else document.getElementById('btn-complete').style.display='none';
    res.scrollIntoView({behavior:'smooth',block:'center'});
  }

  function retryExam(){showExam();}

  function completeModule(){
    const progress=JSON.parse(localStorage.getItem('cs_progress')||'{}');
    progress[capId]='done';
    localStorage.setItem('cs_progress',JSON.stringify(progress));
    location.href='index.html';
  }

  showArticle(0);
</script>
</body>
</html>
