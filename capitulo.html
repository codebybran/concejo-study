<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Módulo — Concejo Study</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .theme-toggle{position:fixed;top:16px;right:16px;z-index:999;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:8px 14px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px;box-shadow:0 2px 12px var(--shadow);transition:all 0.2s;}
    .theme-toggle:hover{background:var(--surface2);}
    nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border);}
    .nav-back{color:var(--text2);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px;transition:color 0.2s;}
    .nav-back:hover{color:var(--gold);}
    .nav-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text);margin-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
    .nav-progress{margin-left:auto;margin-right:120px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2);flex-shrink:0;}
    .nav-prog-bar{width:80px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
    .nav-prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.3s;}
    .cap-header{background:var(--hero-bg);padding:36px 24px 30px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
    .cap-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(255,255,255,0.05) 0%,transparent 60%);}
    .cap-header-inner{max-width:760px;margin:0 auto;position:relative;}
    .cap-titulo-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);font-weight:600;margin-bottom:10px;}
    .cap-icon-big{font-size:40px;margin-bottom:12px;display:block;}
    .cap-nombre{font-family:'Playfair Display',serif;font-size:clamp(22px,4vw,34px);font-weight:900;color:#fff;margin-bottom:8px;line-height:1.2;}
    .cap-sub{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.5;}
    main{max-width:760px;margin:0 auto;padding:32px 20px 80px;}
    .art-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
    .art-counter{font-size:13px;color:var(--text2);}
    .art-num-real{color:var(--gold);font-weight:700;font-size:16px;}
    .art-dots{display:flex;gap:4px;flex-wrap:wrap;max-width:320px;}
    .art-dot{width:8px;height:8px;border-radius:50%;background:var(--surface2);cursor:pointer;transition:all 0.2s;}
    .art-dot.active{background:var(--gold);transform:scale(1.3);}
    .art-dot.leido{background:var(--gold-light);opacity:0.5;}
    .art-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px;box-shadow:0 2px 8px var(--shadow);}
    .art-num-badge{display:inline-flex;align-items:center;background:var(--paragrafo-bg);border:1px solid var(--gold);color:var(--gold);font-size:11px;font-weight:600;letter-spacing:1px;padding:4px 12px;border-radius:100px;margin-bottom:14px;}
    .art-titulo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:18px;line-height:1.3;}
    .art-body{font-size:14px;line-height:1.85;color:var(--text2);}
    .art-body .bloque-p{margin-bottom:12px;color:var(--text2);}
    .art-body .numeral{display:flex;gap:12px;margin-bottom:10px;padding:6px 0;border-bottom:1px solid var(--border);}
    .art-body .numeral-num{min-width:30px;color:var(--gold);font-weight:700;font-size:14px;padding-top:1px;flex-shrink:0;}
    .art-body .numeral-text{flex:1;color:var(--text);}
    .art-body .paragrafo-box{background:var(--paragrafo-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:12px 16px;margin:16px 0;}
    .art-body .paragrafo-label{color:var(--gold);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
    .art-body .paragrafo-texto{color:var(--text2);font-size:14px;line-height:1.7;}
    .art-body .subtitulo-line{color:var(--text);font-weight:600;font-size:13px;margin:16px 0 10px;padding-bottom:4px;border-bottom:1px solid var(--subtitulo-border);}
    .indice-box{background:var(--indice-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:18px;}
    .indice-box-label{color:var(--gold);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
    .indice-item{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);}
    .indice-item:last-child{border-bottom:none;}
    .indice-titulo{color:var(--text);font-size:13px;flex:1;font-weight:500;}
    .indice-pagina{color:var(--gold);font-size:12px;font-weight:700;white-space:nowrap;}
    .encabezado-box{background:var(--consider-bg);border-left:3px solid var(--consider-color);border-radius:0 8px 8px 0;padding:16px;margin-bottom:18px;}
    .encabezado-epigrafe{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--consider-color);text-transform:uppercase;margin-bottom:8px;}
    .encabezado-titulo{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;color:var(--text);margin-bottom:10px;line-height:1.5;}
    .encabezado-intro{font-size:13px;color:var(--text2);line-height:1.6;}
    .consider-box{background:var(--consider-bg);border-left:3px solid var(--consider-color);border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:16px;}
    .consider-label{color:var(--consider-color);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
    .consider-item{display:flex;gap:10px;margin-bottom:12px;}
    .consider-letra{color:var(--gold);font-weight:700;font-size:13px;min-width:24px;flex-shrink:0;}
    .consider-texto{color:var(--text2);font-size:13.5px;line-height:1.7;}
    .acuerda-box{background:var(--paragrafo-bg);border:1px solid var(--gold);border-radius:8px;padding:14px 16px;text-align:center;font-weight:700;color:var(--gold);font-family:'Playfair Display',serif;font-size:16px;letter-spacing:1px;margin-top:8px;margin-bottom:18px;}
    .articulo-inicial-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:8px;}
    .articulo-inicial-num{display:inline-flex;align-items:center;background:var(--gold);color:#000;font-size:12px;font-weight:700;letter-spacing:0.5px;padding:4px 12px;border-radius:100px;margin-bottom:10px;}
    .articulo-inicial-texto{color:var(--text);font-size:14px;line-height:1.75;}
    .art-btns{display:flex;gap:12px;margin-bottom:32px;}
    .btn{flex:1;padding:12px 20px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
    .btn-secondary:hover{background:var(--surface-hover);}
    .btn-primary{background:var(--gold);color:#000;font-weight:600;}
    .btn-primary:hover{background:var(--gold-light);}
    .btn:disabled{opacity:0.35;cursor:not-allowed;}
    .exam-section{background:var(--surface);border:2px solid var(--gold);border-radius:16px;padding:28px;display:none;box-shadow:0 4px 20px var(--shadow);}
    .exam-section.visible{display:block;}
    .exam-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
    .exam-icon{width:44px;height:44px;background:var(--paragrafo-bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid var(--gold);}
    .exam-header-text h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);}
    .exam-header-text p{font-size:12px;color:var(--text2);margin-top:3px;}
    .exam-progress-bar{height:6px;background:var(--surface2);border-radius:3px;margin:16px 0 24px;overflow:hidden;}
    .exam-progress-fill{height:100%;background:var(--gold);border-radius:3px;transition:width 0.4s;}
    .question-block{margin-bottom:28px;display:none;}
    .question-block.active{display:block;}
    .question-text{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px;line-height:1.5;}
    .q-num{display:inline-block;background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;margin-right:8px;}
    .options{display:flex;flex-direction:column;gap:10px;}
    .opt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;text-align:left;transition:all 0.2s;display:flex;align-items:center;gap:12px;}
    .opt-btn:hover:not(:disabled){border-color:var(--gold);background:var(--surface-hover);}
    .opt-btn.correct{background:rgba(52,211,153,0.15);border-color:var(--green);color:var(--green);}
    .opt-btn.wrong{background:rgba(220,38,38,0.12);border-color:var(--red);color:var(--red);}
    .opt-letter{width:28px;height:28px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:var(--text);}
    .opt-btn.correct .opt-letter{background:var(--green);color:#fff;border-color:var(--green);}
    .opt-btn.wrong .opt-letter{background:var(--red);color:#fff;border-color:var(--red);}
    .btn-next-q{width:100%;margin-top:16px;padding:13px;background:var(--gold);color:#000;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;display:none;}
    .btn-next-q:hover{background:var(--gold-light);}
    .exam-result{text-align:center;padding:28px 20px;border-radius:12px;margin-top:8px;display:none;}
    .exam-result.visible{display:block;}
    .exam-result.pass{background:rgba(5,150,105,0.1);border:2px solid var(--green);}
    .exam-result.fail{background:rgba(220,38,38,0.08);border:2px solid var(--red);}
    .exam-result-score{font-size:52px;font-family:'Playfair Display',serif;font-weight:900;line-height:1;}
    .exam-result.pass .exam-result-score{color:var(--green);}
    .exam-result.fail .exam-result-score{color:var(--red);}
    .exam-result-label{font-size:14px;color:var(--text2);margin-top:10px;}
    .btn-complete{width:100%;margin-top:16px;padding:14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .btn-retry{width:100%;margin-top:10px;padding:13px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
    .btn-retry:hover{background:var(--surface-hover);}
    .no-exam-msg{text-align:center;padding:24px;color:var(--text3);font-size:13px;background:var(--surface);border:1px dashed var(--border);border-radius:12px;}
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
  <span id="theme-icon">☀️</span>
  <span id="theme-label">Modo claro</span>
</button>

<nav>
  <a class="nav-back" href="index.html">← Módulos</a>
  <span style="color:var(--border)">|</span>
  <span class="nav-title" id="nav-cap-nombre">Cargando...</span>
  <div class="nav-progress">
    <div class="nav-prog-bar"><div class="nav-prog-fill" id="nav-prog-fill" style="width:0%"></div></div>
    <span id="nav-prog-label">0%</span>
  </div>
</nav>

<div class="cap-header">
  <div class="cap-header-inner">
    <div class="cap-titulo-label" id="cap-titulo-label"></div>
    <span class="cap-icon-big" id="cap-icon"></span>
    <div class="cap-nombre" id="cap-nombre"></div>
    <div class="cap-sub" id="cap-sub"></div>
  </div>
</div>

<main>
  <div class="art-nav">
    <div class="art-counter">
      Artículo <span class="art-num-real" id="art-num-real">—</span>
      &nbsp;<span id="art-pos-label" style="font-size:11px;color:var(--text3);"></span>
    </div>
    <div class="art-dots" id="art-dots"></div>
  </div>
  <div class="art-card">
    <div class="art-num-badge" id="art-badge"></div>
    <div class="art-titulo" id="art-titulo"></div>
    <div class="art-body" id="art-body"></div>
  </div>
  <div class="art-btns">
    <button class="btn btn-secondary" id="btn-prev" onclick="prevArt()">← Anterior</button>
    <button class="btn btn-primary" id="btn-next" onclick="nextArt()">Siguiente →</button>
  </div>
  <div class="exam-section" id="exam-section">
    <div class="exam-header">
      <div class="exam-icon">📝</div>
      <div class="exam-header-text">
        <h3>Examen del Módulo</h3>
        <p id="exam-subtitle">Responde una pregunta a la vez</p>
      </div>
    </div>
    <div class="exam-progress-bar"><div class="exam-progress-fill" id="exam-prog-fill" style="width:0%"></div></div>
    <div id="questions-container"></div>
    <button class="btn-next-q" id="btn-next-q" onclick="nextQuestion()">Siguiente pregunta →</button>
    <div class="exam-result" id="exam-result">
      <div class="exam-result-score" id="result-score"></div>
      <div class="exam-result-label" id="result-msg"></div>
      <button class="btn-complete" id="btn-complete" onclick="completeModule()" style="display:none;">✓ Módulo completado — Volver al inicio</button>
      <button class="btn-retry" onclick="retryExam()">Intentar de nuevo</button>
    </div>
  </div>
</main>

<script src="js/contenido.js"></script>
<script src="js/app.js"></script>
<script src="js/examenes.js"></script>
<script>
  function toggleTheme(){
    const html=document.documentElement;
    const newTheme=html.getAttribute('data-theme')==='dark'?'light':'dark';
    html.setAttribute('data-theme',newTheme);
    localStorage.setItem('cs_theme',newTheme);
    document.getElementById('theme-icon').textContent=newTheme==='dark'?'☀️':'🌙';
    document.getElementById('theme-label').textContent=newTheme==='dark'?'Modo claro':'Modo oscuro';
  }
  const savedTheme=localStorage.getItem('cs_theme')||'dark';
  document.documentElement.setAttribute('data-theme',savedTheme);
  document.getElementById('theme-icon').textContent=savedTheme==='dark'?'☀️':'🌙';
  document.getElementById('theme-label').textContent=savedTheme==='dark'?'Modo claro':'Modo oscuro';

  const params=new URLSearchParams(location.search);
  const capId=parseInt(params.get('id'))||0;
  const cap=CAPITULOS.find(c=>c.id===capId);
  if(!cap)location.href='index.html';

  const artNums=cap.articulos.filter(n=>ARTICULOS[String(n)]);
  let currentIdx=0,leidos=new Set(),examQuestions=[],currentQ=0,answers={};

  document.getElementById('nav-cap-nombre').textContent=cap.nombre;
  document.getElementById('cap-titulo-label').textContent=cap.titulo;
  document.getElementById('cap-icon').textContent=cap.icono;
  document.getElementById('cap-nombre').textContent=cap.nombre;
  document.getElementById('cap-sub').textContent=cap.subtitulo;
  document.title=cap.nombre+' — Concejo Study';

  function formatPreambulo(art){
    let html='';
    if(art.encabezado){
      const e=art.encabezado;
      html+=`<div class="encabezado-box">
        <div class="encabezado-epigrafe">${e.epigrafe}</div>
        <div class="encabezado-titulo">${e.titulo_acuerdo}</div>
        <div class="encabezado-intro">${e.introduccion}</div>
      </div>`;
    }
    if(art.toc && art.toc.length){
      html+='<div class="indice-box"><div class="indice-box-label">📋 Tabla de Contenido</div>';
      art.toc.forEach(entry=>{
        const pag = entry.pagina ? `Pág. ${entry.pagina}` : '';
        html+=`<div class="indice-item"><span class="indice-titulo">${entry.titulo}</span><span class="indice-pagina">${pag}</span></div>`;
      });
      html+='</div>';
    }
    if(art.considerandos && art.considerandos.length){
      html+='<div class="consider-box"><div class="consider-label">⚖️ Considerandos y Fundamentos Legales</div>';
      art.considerandos.forEach(c=>{
        html+=`<div class="consider-item"><span class="consider-letra">${c.letra}</span><span class="consider-texto">${c.texto}</span></div>`;
      });
      html+='</div>';
    }
    if(art.encabezado && art.encabezado.acuerda){
      html+=`<div class="acuerda-box">${art.encabezado.acuerda}</div>`;
    }
    if(art.encabezado && art.encabezado.articulo_inicial){
      const ai = art.encabezado.articulo_inicial;
      html+=`<div class="articulo-inicial-box">
        <div class="articulo-inicial-num">Artículo ${ai.numero}</div>
        <div class="articulo-inicial-texto">${ai.texto}</div>
      </div>`;
    }
    return html;
  }

  function formatTexto(raw){
    const lines=raw.split('\n');
    let html='',i=0;
    while(i<lines.length){
      const line=lines[i].trim();
      if(!line){i++;continue;}

      // Parágrafo (with number, "único", or just "Parágrafo.")
      if(/^Parágrafo(\s+\d|\s+único|\.\s*$|\.\s+\S)/i.test(line)){
        const label=line.match(/^(Parágrafo\s*(?:\d+[°º]?|único)?\.?)/i)?.[1]||'Parágrafo';
        let body=line.slice(label.length).trim();
        while(i+1<lines.length){
          const next=lines[i+1].trim();
          if(!next||/^Parágrafo(\s+\d|\s+único|\.)/i.test(next)||/^\d{1,2}(\.\d{1,2})*\.\s/.test(next))break;
          body+=' '+next;i++;
        }
        html+=`<div class="paragrafo-box"><div class="paragrafo-label">${label}</div><div class="paragrafo-texto">${body}</div></div>`;
      }
      // Nested numeral like 1.1. 2.16. 2.24.
      else if(/^\d{1,2}\.\d{1,2}\.\s/.test(line)){
        const m=line.match(/^(\d{1,2}\.\d{1,2}\.)\s(.*)/);
        let body=m[2];
        while(i+1<lines.length){
          const next=lines[i+1].trim();
          if(!next||/^\d{1,2}(\.\d{1,2})?\.\s/.test(next)||/^Parágrafo(\s+\d|\s+único|\.)/i.test(next))break;
          body+=' '+next;i++;
        }
        html+=`<div class="numeral" style="margin-left:18px;"><span class="numeral-num">${m[1]}</span><span class="numeral-text">${body}</span></div>`;
      }
      // Simple numeral like 1. 2. 24.
      else if(/^\d{1,2}\.\s/.test(line)){
        const m=line.match(/^(\d{1,2}\.)\s(.*)/);
        let body=m[2];
        while(i+1<lines.length){
          const next=lines[i+1].trim();
          if(!next||/^\d{1,2}(\.\d{1,2})?\.\s/.test(next)||/^Parágrafo(\s+\d|\s+único|\.)/i.test(next))break;
          body+=' '+next;i++;
        }
        html+=`<div class="numeral"><span class="numeral-num">${m[1]}</span><span class="numeral-text">${body}</span></div>`;
      }
      else if(/^(Según el |De conformidad |Conforme al )/.test(line)){
        html+=`<div class="subtitulo-line">${line}</div>`;
      } else {
        html+=`<div class="bloque-p">${line}</div>`;
      }
      i++;
    }
    return html;
  }

  function getTitle(art){
    if(art.tipo==='preambulo') return art.titulo;
    const first=art.texto.split('\n')[0].trim();
    const dot=first.indexOf('.');
    if(dot>0&&dot<100)return first.substring(0,dot+1);
    return first.substring(0,80)+(first.length>80?'...':'');
  }

  function renderDots(){
    document.getElementById('art-dots').innerHTML=artNums.map((n,i)=>
      `<div class="art-dot ${i===currentIdx?'active':''} ${leidos.has(i)?'leido':''}" onclick="goTo(${i})" title="Art. ${n===0?'Preámbulo':n}"></div>`
    ).join('');
  }

  function updateProgress(){
    const pct=Math.round((leidos.size/artNums.length)*100);
    document.getElementById('nav-prog-fill').style.width=pct+'%';
    document.getElementById('nav-prog-label').textContent=pct+'%';
  }

  function showArticle(idx){
    currentIdx=idx;leidos.add(idx);
    const artNum=artNums[idx];
    const art=ARTICULOS[String(artNum)];
    const esP=art.tipo==='preambulo';

    document.getElementById('art-num-real').textContent=esP?'Preámbulo':artNum;
    document.getElementById('art-pos-label').textContent=`(${idx+1} de ${artNums.length} en este módulo)`;
    document.getElementById('art-badge').textContent=esP?'Preámbulo y Considerandos':'Artículo '+artNum;
    document.getElementById('art-titulo').textContent=esP?'Índice General y Considerandos':getTitle(art);
    document.getElementById('art-body').innerHTML=esP?formatPreambulo(art):formatTexto(art.texto);

    document.getElementById('btn-prev').disabled=idx===0;
    const isLast=idx===artNums.length-1;
    const btnNext=document.getElementById('btn-next');
    const hasExam = EXAMENES[capId] && EXAMENES[capId].length>0;
    if(isLast && hasExam){
      btnNext.textContent='Ir al Examen ✏️';
      btnNext.onclick=showExam;
      btnNext.style.display='flex';
    } else if(isLast && !hasExam){
      btnNext.style.display='none';
    } else {
      btnNext.textContent='Siguiente →';
      btnNext.onclick=nextArt;
      btnNext.style.display='flex';
    }
    document.getElementById('exam-section').classList.remove('visible');
    renderDots();updateProgress();
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function goTo(idx){showArticle(idx);}
  function prevArt(){if(currentIdx>0)showArticle(currentIdx-1);}
  function nextArt(){if(currentIdx<artNums.length-1)showArticle(currentIdx+1);}

  function showExam(){
    const allQ=EXAMENES[capId]||[];
    if(allQ.length===0) return;
    const shuffled=[...allQ].sort(()=>Math.random()-0.5);
    examQuestions=shuffled.slice(0,Math.min(20,shuffled.length));
    currentQ=0;answers={};
    document.getElementById('exam-result').style.display='none';
    document.getElementById('exam-result').className='exam-result';
    document.getElementById('exam-section').classList.add('visible');
    document.getElementById('exam-subtitle').textContent=`${examQuestions.length} preguntas — una a la vez`;
    renderAllQuestions();showQuestion(0);
    document.getElementById('exam-section').scrollIntoView({behavior:'smooth',block:'start'});
  }

  function renderAllQuestions(){
    const letters=['A','B','C','D'];
    document.getElementById('questions-container').innerHTML=examQuestions.map((q,qi)=>`
      <div class="question-block" id="qblock-${qi}">
        <div class="question-text"><span class="q-num">${qi+1} de ${examQuestions.length}</span>${q.p}</div>
        <div class="options">${q.ops.map((op,oi)=>`
          <button class="opt-btn" id="opt-${qi}-${oi}" onclick="selectOpt(${qi},${oi})">
            <span class="opt-letter">${letters[oi]}</span>${op}
          </button>`).join('')}</div>
      </div>`).join('');
  }

  function showQuestion(qi){
    document.querySelectorAll('.question-block').forEach(b=>b.classList.remove('active'));
    const block=document.getElementById(`qblock-${qi}`);
    if(block)block.classList.add('active');
    document.getElementById('exam-prog-fill').style.width=Math.round((qi/examQuestions.length)*100)+'%';
    document.getElementById('btn-next-q').style.display='none';
  }

  function selectOpt(qi,oi){
    if(answers[qi]!==undefined)return;
    answers[qi]=oi;
    const q=examQuestions[qi];
    const letters=['A','B','C','D'];
    q.ops.forEach((_,i)=>{
      const btn=document.getElementById(`opt-${qi}-${i}`);
      btn.disabled=true;
      if(i===q.r)btn.classList.add('correct');
      else if(i===oi)btn.classList.add('wrong');
      btn.querySelector('.opt-letter').textContent=letters[i];
    });
    if(qi<examQuestions.length-1)document.getElementById('btn-next-q').style.display='block';
    else finishExam();
  }

  function nextQuestion(){currentQ++;showQuestion(currentQ);}

  function finishExam(){
    const correct=examQuestions.filter((q,i)=>answers[i]===q.r).length;
    const score=Math.round((correct/examQuestions.length)*100);
    const res=document.getElementById('exam-result');
    res.style.display='block';
    res.className='exam-result '+(score>=67?'pass':'fail');
    document.getElementById('result-score').textContent=score+'%';
    document.getElementById('result-msg').textContent=score>=67
      ?`¡Excelente! ${correct} de ${examQuestions.length} respuestas correctas.`
      :`${correct} de ${examQuestions.length} correctas. Repasa el módulo e intenta de nuevo.`;
    document.getElementById('exam-prog-fill').style.width='100%';
    document.getElementById('btn-next-q').style.display='none';
    if(score>=67)document.getElementById('btn-complete').style.display='block';
    else document.getElementById('btn-complete').style.display='none';
    res.scrollIntoView({behavior:'smooth',block:'center'});
  }

  function retryExam(){showExam();}
  function completeModule(){
    const p=JSON.parse(localStorage.getItem('cs_progress')||'{}');
    p[capId]='done';localStorage.setItem('cs_progress',JSON.stringify(p));
    location.href='index.html';
  }

  showArticle(0);
</script>
</body>
</html>
