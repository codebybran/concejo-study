    .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
    .error-msg{background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.4);border-radius:10px;padding:10px 14px;font-size:12.5px;color:#F87171;margin-bottom:16px;display:none;}
    .error-msg.visible{display:block;}
    .panel{display:none;}
    .panel.active{display:block;}
  </style>
</head>
